<!DOCTYPE html>
<html>
<head>
    <title>MedPal Robot Control</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="container">

    <h1>🤖 MedPal Robot</h1>

    <div class="status-box">
        <div class="status-title">Current Action</div>
        <div id="statusText" class="status-text">READY</div>
    </div>

    <div class="control-pad">
        <button id="btn-forward" onclick="sendCommand('forward')">▲</button>
        <button id="btn-left" onclick="sendCommand('left')">◀</button>
        <button id="btn-stop" class="stop" onclick="sendCommand('stop')">STOP</button>
        <button id="btn-right" onclick="sendCommand('right')">▶</button>
        <button id="btn-backward" onclick="sendCommand('backward')">▼</button>
    </div>

    <div class="speed-control">
        <label>Speed</label>
        <input type="range" min="0.2" max="1" step="0.1" value="0.6"
               oninput="setSpeed(this.value)">
    </div>

</div>

<script src="/static/script.js"></script>
</body>
</html>
